                    <form method="post" action="/KhachHang/Register">

                        <div class="mb-3">

                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="MatKhau">Mật khẩu</label>
                            <input class="form-control" placeholder="Tối thiểu 6 ký tự" type="password" data-val="true" data-val-length="M&#x1EAD;t kh&#x1EA9;u ph&#x1EA3;i t&#x1EEB; 6 k&#xFD; t&#x1EF1; tr&#x1EDF; l&#xEA;n" data-val-length-max="255" data-val-length-min="6" data-val-required="Vui l&#xF2;ng nh&#x1EAD;p m&#x1EAD;t kh&#x1EA9;u" id="MatKhau" maxlength="255" name="MatKhau" />

                        </div>
